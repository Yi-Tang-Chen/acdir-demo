<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ACDiR Demo</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="demo" aria-label="ACDiR generation demo">
      <header class="topbar">
        <div class="brand">ACDiR</div>
        <select id="level-select" aria-label="Level"></select>
        <div class="stat" id="step-label">-- / --</div>
        <div class="stat" id="remask-label">remask --</div>
        <button type="button" id="fullscreen" title="Fullscreen" aria-label="Fullscreen">⛶</button>
      </header>

      <section class="answers" aria-label="Answers">
        <span id="base-answer">base --</span>
        <span id="guided-answer">guided --</span>
        <span id="gold-answer">gold --</span>
        <div class="mode-tabs" aria-label="Trace view">
          <button type="button" class="mode-tab active" data-mode="guided">guided</button>
          <button type="button" class="mode-tab" data-mode="base">base</button>
          <button type="button" class="mode-tab" data-mode="diff">diff</button>
        </div>
        <button type="button" id="show-base-response" class="mini" title="Show base response">base text</button>
        <button type="button" id="show-guided-response" class="mini" title="Show guided response">guided text</button>
      </section>

      <section class="blockbar" aria-label="Generation blocks">
        <div id="block-label" class="block-label">block --</div>
        <div id="block-track" class="block-track"></div>
      </section>

      <section id="response-panel" class="response-panel" hidden>
        <div class="response-head">
          <span id="response-title">response</span>
          <button type="button" id="close-response" class="mini" title="Close response">close</button>
        </div>
        <pre id="response-text"></pre>
      </section>

      <section id="token-view" class="token-view" aria-live="polite">
        <span class="loading">Loading trace...</span>
      </section>

      <footer class="controls" aria-label="Controls">
        <button type="button" id="prev-step" title="Previous step" aria-label="Previous step">‹</button>
        <button type="button" id="play-pause" class="primary" title="Play / pause" aria-label="Play">▶</button>
        <button type="button" id="next-step" title="Next step" aria-label="Next step">›</button>
        <button type="button" id="next-remask" title="Next critic remask" aria-label="Next critic remask">◆</button>
        <label class="toggle" title="Show only visible tokens">
          <input id="visible-only" type="checkbox">
          <span>visible</span>
        </label>
        <label class="speed" title="Playback speed">
          <span>speed</span>
          <input id="speed-slider" type="range" min="120" max="900" step="30" value="420">
        </label>
        <input id="step-slider" type="range" min="0" max="0" value="0" aria-label="Step">
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
