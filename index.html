<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ACDiR Generation Demo</title>
    <meta name="description" content="Step-by-step ACDiR generation process.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage" aria-label="ACDiR step-by-step generation process">
      <figure class="viewer">
        <img
          id="step-image"
          src="assets/steps/step_025.png"
          alt="ACDiR generation step 25"
        >
      </figure>

      <nav class="controls" aria-label="Generation controls">
        <button type="button" id="prev-step" aria-label="Previous step">&lsaquo;</button>
        <button type="button" id="play-pause" aria-label="Play generation">Play</button>
        <button type="button" id="next-step" aria-label="Next step">&rsaquo;</button>
        <span id="step-label" aria-live="polite">step 025</span>
        <input
          id="step-slider"
          type="range"
          min="0"
          max="15"
          value="0"
          aria-label="Select generation step"
        >
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
